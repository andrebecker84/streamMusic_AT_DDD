<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 252" width="760" height="228">
  <defs>
    <linearGradient id="vgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vgOps" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vgStack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vgPat" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="vgShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feFlood flood-color="#6366f1" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="SourceAlpha" operator="in" result="shadowBase"/>
      <feGaussianBlur in="shadowBase" stdDeviation="7" result="shadowBlur"/>
      <feMerge>
        <feMergeNode in="shadowBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer container -->
  <rect x="20" y="10" width="800" height="232" rx="10" fill="url(#vgBg)"
        stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.6" filter="url(#vgShadow)"/>

  <!-- ── CARD 1: Operações (indigo) ── -->
  <rect x="40" y="26" width="240" height="200" rx="8" fill="#0d1117" stroke="#6366f1" stroke-width="1" stroke-opacity="0.7"/>
  <rect x="40" y="26" width="240" height="4" rx="2" fill="url(#vgOps)"/>
  <g transform="translate(120, 39)">
    <line x1="0" y1="2.5" x2="13" y2="2.5" stroke="#a5b4fc" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="9" cy="2.5" r="1.8" fill="#a5b4fc"/>
    <line x1="0" y1="6.5" x2="13" y2="6.5" stroke="#a5b4fc" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="4" cy="6.5" r="1.8" fill="#a5b4fc"/>
    <line x1="0" y1="10.5" x2="13" y2="10.5" stroke="#a5b4fc" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="9" cy="10.5" r="1.8" fill="#a5b4fc"/>
  </g>
  <text x="169" y="51" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="#a5b4fc">Operações</text>
  <line x1="56" y1="60" x2="264" y2="60" stroke="#1e2035" stroke-width="1"/>
  <circle cx="58" cy="77"  r="3" fill="#6366f1"/><text x="68" y="81"  font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Criar Conta</text>
  <circle cx="58" cy="103" r="3" fill="#6366f1"/><text x="68" y="107" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Assinatura de Plano</text>
  <circle cx="58" cy="129" r="3" fill="#6366f1"/><text x="68" y="133" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Autorizar Transação</text>
  <circle cx="58" cy="155" r="3" fill="#6366f1"/><text x="68" y="159" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Favoritar Músicas</text>
  <circle cx="58" cy="181" r="3" fill="#6366f1"/><text x="68" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Gerenciar Playlists</text>

  <!-- ── CARD 2: Stack (green) ── -->
  <rect x="300" y="26" width="240" height="200" rx="8" fill="#0d1117" stroke="#4ade80" stroke-width="1" stroke-opacity="0.7"/>
  <rect x="300" y="26" width="240" height="4" rx="2" fill="url(#vgStack)"/>
  <g transform="translate(394, 39)">
    <polyline points="0,10 6.5,7.5 13,10" fill="none" stroke="#86efac" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="0,7 6.5,4.5 13,7" fill="none" stroke="#86efac" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="0,4 6.5,1.5 13,4" fill="none" stroke="#86efac" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="429" y="51" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="#86efac">Stack</text>
  <line x1="316" y1="60" x2="524" y2="60" stroke="#1e2035" stroke-width="1"/>
  <circle cx="318" cy="77"  r="3" fill="#4ade80"/><text x="328" y="81"  font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Java 25</text>
  <circle cx="318" cy="103" r="3" fill="#4ade80"/><text x="328" y="107" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Spring Boot 4.1.0</text>
  <circle cx="318" cy="129" r="3" fill="#4ade80"/><text x="328" y="133" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">H2 · Redis</text>
  <circle cx="318" cy="155" r="3" fill="#4ade80"/><text x="328" y="159" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Docker Compose</text>
  <circle cx="318" cy="181" r="3" fill="#4ade80"/><text x="328" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Lombok · Maven 3.9</text>

  <!-- ── CARD 3: Patterns & Arquitetura (purple) ── -->
  <rect x="560" y="26" width="240" height="200" rx="8" fill="#0d1117" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.7"/>
  <rect x="560" y="26" width="240" height="4" rx="2" fill="url(#vgPat)"/>
  <g transform="translate(606, 39)">
    <rect x="0.5" y="0.5" width="5" height="5" rx="0.8" fill="none" stroke="#c4b5fd" stroke-width="1.3"/>
    <rect x="7.5" y="0.5" width="5" height="5" rx="0.8" fill="none" stroke="#c4b5fd" stroke-width="1.3"/>
    <rect x="0.5" y="7.5" width="5" height="5" rx="0.8" fill="none" stroke="#c4b5fd" stroke-width="1.3"/>
    <rect x="7.5" y="7.5" width="5" height="5" rx="0.8" fill="none" stroke="#c4b5fd" stroke-width="1.3"/>
  </g>
  <text x="689" y="51" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">Patterns &amp; Arquitetura</text>
  <line x1="576" y1="60" x2="784" y2="60" stroke="#1e2035" stroke-width="1"/>
  <circle cx="578" cy="77"  r="3" fill="#8b5cf6"/><text x="588" y="81"  font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">DDD — 4 Bounded Contexts</text>
  <circle cx="578" cy="103" r="3" fill="#8b5cf6"/><text x="588" y="107" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Strategy — Antifraude</text>
  <circle cx="578" cy="129" r="3" fill="#8b5cf6"/><text x="588" y="133" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Repository Pattern</text>
  <circle cx="578" cy="155" r="3" fill="#8b5cf6"/><text x="588" y="159" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">Command Pattern</text>
  <circle cx="578" cy="181" r="3" fill="#8b5cf6"/><text x="588" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#cbd5e1">SOLID + Clean Code</text>
</svg>
