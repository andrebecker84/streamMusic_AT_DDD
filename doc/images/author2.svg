<svg width="520" height="240" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- ── Blob gradients (atenuados) ── -->
    <radialGradient id="a2Blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a2Blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a2Blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Glass top-highlight ── -->
    <linearGradient id="a2Highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.11"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- ── Shimmer sweep ── -->
    <linearGradient id="a2Shimmer" x1="-100%" y1="0%" x2="-70%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animate attributeName="x1" values="-100%;200%" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-70%;230%"  dur="4.5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- ── Button gradients ── -->
    <linearGradient id="a2GhGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2d333b"/>
      <stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="a2LiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a66c2"/>
      <stop offset="100%" stop-color="#074f96"/>
    </linearGradient>

    <!-- ── Card outer glow (esmaece até transparente — SVG bg transparente) ── -->
    <filter id="a2CardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.28" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Frost blur ── -->
    <filter id="a2FrostBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <!-- ── Button shadow ── -->
    <filter id="a2BtnShd" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="b"/>
      <feOffset dx="0" dy="2" in="b" result="o"/>
      <feComponentTransfer in="o"><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Card clip (blobs contidos dentro do card) ── -->
    <clipPath id="a2Clip">
      <rect x="50" y="30" width="420" height="180" rx="16"/>
    </clipPath>

  </defs>

  <!-- ════════════════════════════════
       SVG background transparente — glow do card esmaece na página
       ════════════════════════════════ -->

  <!-- ════════════════════════════════
       LAYER 1 — frosted glass (blobs confinados ao card)
       ════════════════════════════════ -->
  <g clip-path="url(#a2Clip)">
    <!-- Base escura para o frost funcionar -->
    <rect x="50" y="30" width="420" height="180" fill="#0d1117"/>
    <!-- Blobs animados (visíveis através do glass) -->
    <ellipse cx="120" cy="90" rx="180" ry="145" fill="url(#a2Blob1)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -14,11; 7,-9; 0,0" dur="9s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </ellipse>
    <ellipse cx="420" cy="150" rx="165" ry="135" fill="url(#a2Blob2)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 11,-15; -9,11; 0,0" dur="11s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </ellipse>
    <ellipse cx="330" cy="25" rx="125" ry="100" fill="url(#a2Blob3)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 9,13; -11,-7; 0,0" dur="13s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </ellipse>
    <!-- Frost blur (cópia borrada) -->
    <g filter="url(#a2FrostBlur)">
      <rect x="50" y="30" width="420" height="180" fill="#0d1117"/>
      <ellipse cx="120" cy="90" rx="180" ry="145" fill="url(#a2Blob1)"/>
      <ellipse cx="420" cy="150" rx="165" ry="135" fill="url(#a2Blob2)"/>
      <ellipse cx="330" cy="25" rx="125" ry="100" fill="url(#a2Blob3)"/>
    </g>
    <!-- Dark tint -->
    <rect x="50" y="30" width="420" height="180" fill="#0a0d1c" fill-opacity="0.60"/>
    <!-- Top highlight -->
    <rect x="50" y="30" width="420" height="180" fill="url(#a2Highlight)">
      <animate attributeName="opacity" values="0.75;1;0.75" dur="5s" repeatCount="indefinite"/>
    </rect>
    <!-- Shimmer -->
    <rect x="50" y="30" width="420" height="180" fill="url(#a2Shimmer)"/>
  </g>

  <!-- ════════════════════════════════
       LAYER 2 — card border + glow (esmaece para fora)
       ════════════════════════════════ -->
  <rect x="50" y="30" width="420" height="180" rx="16"
        fill="none" stroke="#6366f1" stroke-width="1.5"
        filter="url(#a2CardGlow)">
    <animate attributeName="stroke-opacity" values="0.2;0.65;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="51" y="31" width="418" height="178" rx="15"
        fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>

  <!-- ════════════════════════════════
       LAYER 3 — floating content
       ════════════════════════════════ -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-4; 0,0" dur="5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0.05 0.55 0.95;0.45 0.05 0.55 0.95"/>

    <!-- Name (center x=260 = 50+420/2) -->
    <text x="260" y="88"
          text-anchor="middle"
          font-family="'Segoe UI','SF Pro Display',-apple-system,sans-serif"
          font-size="21" font-weight="700" fill="#e6edf3" letter-spacing="-0.3">
      André Luis Becker
    </text>

    <text x="260" y="111"
          text-anchor="middle"
          font-family="'Segoe UI','SF Pro Display',-apple-system,sans-serif"
          font-size="13" fill="#8b949e" letter-spacing="0.5">
      Software Engineer
    </text>

    <line x1="155" y1="130" x2="365" y2="130"
          stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.12"/>

    <!-- GitHub button — par centrado em x=260, total=288, início=(520-288)/2=116 -->
    <g transform="translate(116, 157)" filter="url(#a2BtnShd)">
      <rect x="0" y="0" width="153" height="38" rx="9"
            fill="url(#a2GhGrad)" stroke="#3d444d" stroke-width="0.8"/>
      <rect x="-1" y="-1" width="155" height="40" rx="10"
            fill="none" stroke="#6366f1" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0;0.6;0" dur="2.8s" repeatCount="indefinite"/>
      </rect>
      <svg x="14" y="9" width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#e6edf3" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      <text x="37" y="24"
            font-family="'Segoe UI',sans-serif"
            font-size="12.5" fill="#e6edf3" letter-spacing="0.1">@andrebecker84</text>
    </g>

    <!-- LinkedIn button — inicia em 116+153+17=286 -->
    <g transform="translate(286, 157)" filter="url(#a2BtnShd)">
      <rect x="0" y="0" width="118" height="38" rx="9"
            fill="url(#a2LiGrad)" stroke="#0a66c2" stroke-width="0.8"/>
      <rect x="-1" y="-1" width="120" height="40" rx="10"
            fill="none" stroke="#38bdf8" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0;0.6;0" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
      </rect>
      <svg x="14" y="9" width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#ffffff" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      <text x="37" y="24"
            font-family="'Segoe UI',sans-serif"
            font-size="12.5" fill="#ffffff" letter-spacing="0.1">@becker84</text>
    </g>

  </g>

</svg>
