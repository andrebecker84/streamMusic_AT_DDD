<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 272" width="760" height="246">
  <defs>
    <linearGradient id="exBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="exLocal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="exDocker" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1"/>
    </linearGradient>
    <filter id="exShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feFlood flood-color="#6366f1" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="SourceAlpha" operator="in" result="shadowBase"/>
      <feGaussianBlur in="shadowBase" stdDeviation="7" result="shadowBlur"/>
      <feMerge>
        <feMergeNode in="shadowBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer container -->
  <rect x="20" y="10" width="800" height="252" rx="10" fill="url(#exBg)"
