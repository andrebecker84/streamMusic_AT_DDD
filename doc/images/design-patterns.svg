  <text x="420" y="256" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#64748b">DIP ✓ — infra é substituível</text>
  <text x="420" y="269" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#374151">4 repos: Account · Sub · TRX · Music</text>


