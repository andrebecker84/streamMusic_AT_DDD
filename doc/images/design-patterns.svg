  <text x="169" y="52" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="700" fill="#a5b4fc">Strategy</text>
  <line x1="56" y1="61" x2="264" y2="61" stroke="#1e2035" stroke-width="1"/>

