<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" width="760" height="271">
  <defs>
    <linearGradient id="dpBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dpStrat" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dpRepo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dpCmd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1"/>
    </linearGradient>
    <filter id="dpShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feFlood flood-color="#6366f1" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="SourceAlpha" operator="in" result="shadowBase"/>
      <feGaussianBlur in="shadowBase" stdDeviation="7" result="shadowBlur"/>
      <feMerge>
        <feMergeNode in="shadowBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer container -->
  <rect x="20" y="10" width="800" height="280" rx="10" fill="url(#dpBg)"
