spring.datasource.url=jdbc:h2:mem:streaming;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=${PORT:8087}

# Cache — "simple" usa mapa em memória (sem Redis)
# Para ativar Redis, rode com Docker ou sobrescreva: SPRING_CACHE_TYPE=redis
spring.cache.type=simple

# Redis — usado quando spring.cache.type=redis (ex.: via Docker)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.connect-timeout=2000ms

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

# Actuator — expõe só /actuator/health (usado pelo healthcheck do Docker)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
